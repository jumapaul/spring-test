apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: spring-test
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/jumapaul/spring-test.git
    targetRevision: master
    path: helm
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: concept
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
